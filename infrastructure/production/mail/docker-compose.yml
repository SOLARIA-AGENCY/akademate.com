services:
  mailpit:
    image: axllent/mailpit:latest
    container_name: akademate-mail
    restart: unless-stopped
    ports:
      - "8025:8025"
    expose:
      - "1025"
    environment:
      MP_DATABASE: /data/mailpit.db
      MP_MAX_MESSAGES: 5000
      MP_UI_AUTH: "${MAIL_UI_USER:-admin}:${MAIL_UI_PASS:-akademate2026}"
      MP_SMTP_RELAY_HOST: smtp-relay.brevo.com
      MP_SMTP_RELAY_PORT: "587"
      MP_SMTP_RELAY_STARTTLS: "true"
      MP_SMTP_RELAY_USERNAME: 91c4ea001@smtp-brevo.com
      MP_SMTP_RELAY_PASSWORD: "${SMTP_RELAY_PASS}"
      MP_SMTP_RELAY_ALL: "true"
    volumes:
      - mail_data:/data
    networks:
      - internal

volumes:
  mail_data:

networks:
  internal:
    external: true
    name: tenant-admin_internal
