# Routing para app.akademate.com → tenant-admin container (cliente SaaS)

http:
  routers:
    app-https:
      rule: "Host(`app.akademate.com`)"
      entrypoints:
        - websecure
      service: app-tenant
      tls:
        certresolver: letsencrypt
        domains:
          - main: app.akademate.com

  services:
    app-tenant:
      loadBalancer:
        servers:
          - url: "http://akademate-tenant:3009"
        healthCheck:
          path: /auth/login
          interval: 30s
          timeout: 10s
