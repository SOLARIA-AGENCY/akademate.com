# =============================================================================
# Akademate Tenant Admin Dashboard — Stack Completo
# admin.akademate.com
#
# Deploy:
#   cd /opt/akademate/tenant-admin
#   cp .env.example .env  # completar POSTGRES_PASSWORD, PAYLOAD_SECRET, BETTER_AUTH_SECRET
#   docker compose up -d --build
# =============================================================================

services:
  postgres:
    image: postgres:16-alpine
    container_name: akademate-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-akademate}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
      POSTGRES_DB: ${POSTGRES_DB:-akademate}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-akademate}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - internal
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "3"

  tenant-admin:
    build:
      context: /opt/akademate/repo
      dockerfile: infrastructure/docker/Dockerfile.tenant-admin
    image: akademate-tenant:latest
    container_name: akademate-tenant
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: production
      DATABASE_URL: ${DATABASE_URL}
      DATABASE_HOST: postgres
      DATABASE_PORT: "5432"
      DATABASE_NAME: ${POSTGRES_DB:-akademate}
      DATABASE_USER: ${POSTGRES_USER:-akademate}
      DATABASE_PASSWORD: ${POSTGRES_PASSWORD}
      PAYLOAD_SECRET: ${PAYLOAD_SECRET:?Set PAYLOAD_SECRET in .env}
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET:?Set BETTER_AUTH_SECRET in .env}
      BETTER_AUTH_URL: https://app.akademate.com
      PAYLOAD_PUBLIC_SERVER_URL: ${PAYLOAD_PUBLIC_SERVER_URL:-https://cepcomunicacion.akademate.com}
      NEXT_PUBLIC_WEB_URL: https://akademate.com
      NEXT_PUBLIC_TENANT_URL: https://app.akademate.com
      NEXT_TELEMETRY_DISABLED: "1"
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASS: ${SMTP_PASS}
      SMTP_SECURE: ${SMTP_SECURE}
      SMTP_FROM: ${SMTP_FROM}
      DKIM_DOMAIN: ${DKIM_DOMAIN}
      DKIM_SELECTOR: ${DKIM_SELECTOR}
      DKIM_PRIVATE_KEY_PATH: ${DKIM_PRIVATE_KEY_PATH}
    volumes:
      - media_data:/app/apps/tenant-admin/public/media
      - /opt/akademate/mail/dkim:/app/dkim:ro
    networks:
      - internal
      - proxy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:3009/auth/login"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 120s
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "3"

networks:
  internal:
    driver: bridge
  proxy:
    external: true

volumes:
  postgres_data:
    driver: local
  media_data:
    driver: local
