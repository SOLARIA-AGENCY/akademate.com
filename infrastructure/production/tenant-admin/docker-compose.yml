# =============================================================================
# Akademate Tenant Admin Dashboard
# app.akademate.com
#
# Deploy:
#   cd /opt/akademate/tenant-admin
#   cp .env.example .env  # editar valores
#   docker compose build
#   docker compose up -d
# =============================================================================

services:
  tenant-admin:
    build:
      context: /opt/akademate/repo
      dockerfile: infrastructure/docker/Dockerfile.tenant-admin
    image: akademate-tenant:latest
    container_name: akademate-tenant
    restart: unless-stopped
    environment:
      NODE_ENV: production
      DATABASE_URL: ${DATABASE_URL:?DATABASE_URL required}
      DATABASE_HOST: ${DATABASE_HOST:-localhost}
      DATABASE_PORT: ${DATABASE_PORT:-5432}
      DATABASE_NAME: ${DATABASE_NAME:-akademate}
      DATABASE_USER: ${DATABASE_USER:-akademate}
      DATABASE_PASSWORD: ${DATABASE_PASSWORD:?DATABASE_PASSWORD required}
      PAYLOAD_SECRET: ${PAYLOAD_SECRET:?PAYLOAD_SECRET required}
      PAYLOAD_CMS_URL: ${PAYLOAD_CMS_URL:-http://localhost:3003}
      PAYLOAD_API_KEY: ${PAYLOAD_API_KEY:-}
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET:?BETTER_AUTH_SECRET required}
      BETTER_AUTH_URL: https://app.akademate.com
      NEXT_PUBLIC_WEB_URL: https://akademate.com
      NEXT_PUBLIC_TENANT_URL: https://app.akademate.com
      NEXT_TELEMETRY_DISABLED: "1"
      ENFORCE_HTTPS: "true"
    labels:
      - "traefik.enable=true"
    networks:
      - proxy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:3009/auth/login"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 90s
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "3"

networks:
  proxy:
    external: true
