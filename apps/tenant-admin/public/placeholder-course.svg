<svg width="800" height="480" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Soft neutral gradient -->
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#f1f5f9"/>
      <stop offset="100%" stop-color="#e2e8f0"/>
    </linearGradient>
    <!-- Subtle dot pattern -->
    <pattern id="dots" width="24" height="24" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1.5" fill="#cbd5e1" opacity="0.5"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="800" height="480" fill="url(#bg)"/>
  <!-- Texture overlay -->
  <rect width="800" height="480" fill="url(#dots)"/>

  <!-- Centered icon group: open book -->
  <g transform="translate(400,240)">
    <!-- Book spine (center line) -->
    <rect x="-3" y="-70" width="6" height="112" rx="3" fill="#94a3b8" opacity="0.6"/>

    <!-- Left page -->
    <path d="M-6 -62 Q-60 -66 -110 -54 L-110 44 Q-60 30 -6 34 Z"
          fill="#94a3b8" opacity="0.25"/>
    <path d="M-6 -62 Q-60 -66 -110 -54 L-110 44 Q-60 30 -6 34 Z"
          fill="none" stroke="#94a3b8" stroke-width="1.5" opacity="0.4"/>
    <!-- Left page lines -->
    <line x1="-96" y1="-32" x2="-22" y2="-36" stroke="#94a3b8" stroke-width="2" opacity="0.3"/>
    <line x1="-96" y1="-14" x2="-22" y2="-16" stroke="#94a3b8" stroke-width="2" opacity="0.3"/>
    <line x1="-96" y1="4"   x2="-22" y2="2"   stroke="#94a3b8" stroke-width="2" opacity="0.3"/>
    <line x1="-96" y1="22"  x2="-22" y2="20"  stroke="#94a3b8" stroke-width="2" opacity="0.3"/>

    <!-- Right page -->
    <path d="M6 -62 Q60 -66 110 -54 L110 44 Q60 30 6 34 Z"
          fill="#94a3b8" opacity="0.25"/>
    <path d="M6 -62 Q60 -66 110 -54 L110 44 Q60 30 6 34 Z"
          fill="none" stroke="#94a3b8" stroke-width="1.5" opacity="0.4"/>
    <!-- Right page lines -->
    <line x1="96" y1="-32" x2="22" y2="-36" stroke="#94a3b8" stroke-width="2" opacity="0.3"/>
    <line x1="96" y1="-14" x2="22" y2="-16" stroke="#94a3b8" stroke-width="2" opacity="0.3"/>
    <line x1="96" y1="4"   x2="22" y2="2"   stroke="#94a3b8" stroke-width="2" opacity="0.3"/>
    <line x1="96" y1="22"  x2="22" y2="20"  stroke="#94a3b8" stroke-width="2" opacity="0.3"/>

    <!-- Book bottom/shadow -->
    <ellipse cx="0" cy="52" rx="90" ry="6" fill="#94a3b8" opacity="0.12"/>
  </g>
</svg>
